<nav class="app-navbar py-2 border-bottom">

  <div class="container d-flex align-items-center justify-content-between">
    <a class="app-brand fw-bold text-decoration-none" href="{% url 'index' %}">
      To-do
    </a>
    <div class="menu d-flex justify-content-between align-items-center gap-3">

      {% if user.is_authenticated %}

        <a class="nav-link-custom" href="{% url 'tasks:list' %}">
          Tasks
        </a>

        <a class="nav-link-custom" href="{% url 'accounts:profile' %}">
          Perfil
        </a>

        <span class="nav-user">
          {{ user.username }}
        </span>

        <form method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button class="btn-logout" type="submit">
            Sair
          </button>
        </form>

      {% else %}

        <a class="nav-link-custom" href="{% url 'accounts:login' %}">
          Login
        </a>

        <a class="btn-primary-ui" href="{% url 'accounts:register' %}">
          Criar conta
        </a>

      {% endif %}

    </div>

  </div>

</nav>
